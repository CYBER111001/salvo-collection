<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SALVO COLLECTION</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>
  <div id="loader">
    <div class="spinner"></div>
    <h2>SALVO COLLECTION</h2>
</div>

<header class="header">

<div class="logo">
SALVO COLLECTION
</div>

<nav>

<a href="#">Home</a>

<a href="#">Products</a>

<a href="#">Contact</a>

</nav>

</header>



<h2 class="title">
✨ New Arrivals
</h2>

<section class="products">
  <div class="product">
    <span class="badge">NEW</span>
<img src="Images/1784745617773.jpg"
     alt="Baby Dress"
     onclick="openPopup(this.src)">
    <h2>Baby Dress</h2>
    <p class="price">Rs. 3400</p>
    <button onclick="addToCart('Baby Dress',3400)">🛒 Add to Cart</button>
</div>

<div class="product">
    <span class="badge">BEST SELLER</span>
<img src="Images/1784745653497.jpg" alt="Teddy Bag" onclick="openPopup(this.src)">
    <h2>Teddy Bag</h2>
    <p class="price">Rs. 2400</p>
    <button onclick="addToCart('Teddy Bag',2400)">🛒 Add to Cart</button>
</div>

</section>

<section class="customer">

<h2>Customer Details</h2>

<input type="text" id="name" placeholder="Your Name">

<input type="tel" id="phone" placeholder="Phone Number">

<textarea id="address" placeholder="Delivery Address"></textarea>

<button onclick="sendOrder()">📲 WhatsApp Order</button>

<button onclick="viewCart()">🛒 View Cart</button>

</section>

<footer>
    <h3>SALVO COLLECTION</h3>
    <p>📍 14 Mile Post, Bakinigahawela, Bible Road</p>
    <p>📞 0783456345</p>
</footer>

<script src="script.js"></script>
<!-- Image Popup -->
<div id="popup" class="popup" onclick="closePopup()">
    <img id="popupImg">
</div>
<a href="https://wa.me/94783456345" class="whatsapp" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg" alt="WhatsApp">
</a>
</body>
</html>
